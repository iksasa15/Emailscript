<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إرسال الإيميلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --danger: #f85149;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.5rem 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    input[type="file"]::file-selector-button {
      padding: 0.4rem 0.75rem;
      margin-left: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-top: 0.5rem;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }
    .result.show { display: block; }
    .result.success { background: rgba(63, 185, 80, 0.15); border: 1px solid var(--success); color: var(--success); }
    .result.error { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--danger); color: var(--danger); }
    .result ul { margin-top: 0.5rem; padding-right: 1.25rem; }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .progress-box {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      min-height: 80px;
      font-size: 0.95rem;
    }
    .progress-box .current {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .progress-box .done-item {
      color: var(--success);
      margin: 0.2rem 0;
    }
    .progress-box .fail-item {
      color: var(--danger);
      margin: 0.2rem 0;
    }
    .progress-box .summary {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
    .preview-box {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .preview-box .preview-title { color: var(--muted); margin-bottom: 0.5rem; font-weight: 600; }
    .preview-box .preview-list { color: var(--text); }
    .preview-box .preview-list span { display: block; padding: 0.2rem 0; }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
      width: auto;
      font-size: 0.9rem;
    }
    .btn-secondary:hover { background: var(--muted); }
    .export-btns { margin-top: 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .export-btns .btn { width: auto; flex: 1; min-width: 140px; }
    .skip-notice {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 180px;
      overflow-y: auto;
    }
    .skip-notice ul { margin: 0.35rem 0 0; padding-right: 1.1rem; }
    .password-wrap {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }
    .password-wrap input {
      flex: 1;
      min-width: 0;
    }
    .btn-toggle-password {
      flex-shrink: 0;
      padding: 0.5rem 0.85rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      align-self: stretch;
    }
    .btn-toggle-password:hover {
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>إرسال الإيميلات من ملف إكسل</h1>

    <form id="form" class="card">
      <div class="form-group">
        <label for="email">إيميل المرسل</label>
        <input type="email" id="email" name="email" placeholder="your@gmail.com" required />
      </div>
      <div class="form-group">
        <label for="password">كلمة مرور التطبيق</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="btn-toggle-password" id="togglePassword" aria-pressed="false" title="إظهار أو إخفاء كلمة المرور">إظهار</button>
        </div>
        <p class="hint">استخدم كلمة مرور التطبيق من إعدادات Gmail وليس كلمة مرور الحساب</p>
      </div>
      <div class="form-group">
        <label for="emails_file">ملف الإيميلات (إكسل .xlsx)</label>
        <input type="file" id="emails_file" name="emails_file" accept=".xlsx,.xls" required />
        <p class="hint">العمود الأول أو عمود باسم "email" يحتوي على عناوين الإيميل</p>
        <button type="button" class="btn btn-secondary" id="previewBtn">معاينة القائمة</button>
        <div id="previewBox" class="preview-box" style="display: none;">
          <div class="preview-title" id="previewTitle"></div>
          <div class="preview-list" id="previewList"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="email_column">اسم عمود الإيميل (اختياري)</label>
        <input type="text" id="email_column" name="email_column" value="email" placeholder="email" />
      </div>
      <div class="form-group">
        <label for="attachments">مرفقات (اختياري)</label>
        <input type="file" id="attachments" name="attachments" multiple />
        <p class="hint">يمكنك اختيار أكثر من ملف. تُرفق نفس الملفات بكل إيميل</p>
      </div>
      <div class="form-group">
        <label for="subject">عنوان الرسالة</label>
        <input type="text" id="subject" name="subject" placeholder="الموضوع" required />
      </div>
      <div class="form-group">
        <label for="body">نص الرسالة</label>
        <textarea id="body" name="body" placeholder="اكتب نص الرسالة هنا..."></textarea>
      </div>
      <div class="form-group">
        <label for="delay">التأخير بين كل إيميل (ثانية)</label>
        <input type="number" id="delay" name="delay" value="1.5" min="0" step="0.5" />
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">إرسال</button>
    </form>

    <div id="result" class="result card"></div>
    <div id="progressBox" class="progress-box card" style="display: none;"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const resultEl = document.getElementById('result');
    const progressBox = document.getElementById('progressBox');
    const submitBtn = document.getElementById('submitBtn');
    const previewBtn = document.getElementById('previewBtn');
    const previewBox = document.getElementById('previewBox');
    const previewTitle = document.getElementById('previewTitle');
    const previewList = document.getElementById('previewList');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');

    togglePasswordBtn.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePasswordBtn.textContent = isHidden ? 'إخفاء' : 'إظهار';
      togglePasswordBtn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
    });

    previewBtn.addEventListener('click', async () => {
      const file = document.getElementById('emails_file').files[0];
      if (!file) {
        resultEl.classList.add('show', 'error');
        resultEl.className = 'result card show error';
        resultEl.textContent = 'اختر ملف الإيميلات أولاً';
        return;
      }
      const fd = new FormData();
      fd.append('emails_file', file);
      fd.append('email_column', document.getElementById('email_column').value.trim() || 'email');
      previewBtn.disabled = true;
      previewBtn.textContent = 'جاري المعاينة...';
      try {
        const res = await fetch('/preview', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.ok) {
          previewBox.style.display = 'block';
          let title = 'تم قبول ' + data.count + ' إيميل للإرسال';
          if (data.rejected_count > 0) {
            title += ' (تم تخطي ' + data.rejected_count + ' لصيغة غير صالحة)';
          }
          previewTitle.textContent = title + ':';
          let listHtml = data.emails.map(e => '<span>' + e + '</span>').join('');
          if (data.rejected && data.rejected.length > 0) {
            listHtml += '<p style="margin-top:0.75rem;color:var(--muted);font-size:0.85rem;">مرفوضة قبل الإرسال:</p>';
            listHtml += data.rejected.slice(0, 25).map(r =>
              '<span class="fail-item" style="display:block">' + (r.raw || '') + ' — ' + (r.reason || '') + '</span>'
            ).join('');
            if (data.rejected.length > 25) {
              listHtml += '<span class="hint">… و ' + (data.rejected.length - 25) + ' أخرى</span>';
            }
          }
          previewList.innerHTML = listHtml;
        } else {
          resultEl.className = 'result card show error';
          resultEl.textContent = data.error || 'حدث خطأ';
          resultEl.classList.add('show');
        }
      } catch (err) {
        resultEl.className = 'result card show error';
        resultEl.textContent = 'خطأ في الاتصال: ' + err.message;
        resultEl.classList.add('show');
      }
      previewBtn.disabled = false;
      previewBtn.textContent = 'معاينة القائمة';
    });

    function escapeCsv(s) {
      if (s == null) return '';
      s = String(s);
      if (/[,"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }
    function downloadCsv(results) {
      const header = 'الإيميل,الحالة,رسالة الخطأ';
      const rows = results.map(r => [r.email, r.status, r.message].map(escapeCsv).join(','));
      const blob = new Blob(['\uFEFF' + header + '\n' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'نتائج_الإرسال.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    async function downloadExcel(results) {
      const res = await fetch('/export-results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ results: results })
      });
      if (!res.ok) throw new Error('فشل التصدير');
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'نتائج_الإرسال.xlsx';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultEl.classList.remove('show', 'success', 'error');
      resultEl.textContent = '';
      progressBox.style.display = 'block';
      progressBox.innerHTML = '<span class="current">جاري التحضير...</span>';
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري الإرسال...';
      let sendResults = [];

      const fd = new FormData();
      fd.append('email', document.getElementById('email').value.trim());
      fd.append('password', document.getElementById('password').value);
      fd.append('subject', document.getElementById('subject').value.trim());
      fd.append('body', document.getElementById('body').value.trim());
      fd.append('email_column', document.getElementById('email_column').value.trim() || 'email');
      fd.append('delay', document.getElementById('delay').value || '1.5');
      const file = document.getElementById('emails_file').files[0];
      if (file) fd.append('emails_file', file);
      const attachmentFiles = document.getElementById('attachments').files;
      for (let i = 0; i < attachmentFiles.length; i++) {
        fd.append('attachments', attachmentFiles[i]);
      }

      try {
        const res = await fetch('/send', { method: 'POST', body: fd });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || 'حدث خطأ');
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let doneItems = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const part of parts) {
            const line = part.split('\n').find(l => l.startsWith('data:'));
            if (!line) continue;
            let data;
            try {
              data = JSON.parse(line.slice(5).trim());
            } catch (_) { continue; }
            if (data.status === 'ready') {
              let skipBlock = '';
              if (data.rejected_count > 0 && data.rejected) {
                skipBlock = '<div class="skip-notice">تم تخطي ' + data.rejected_count +
                  ' عنواناً (صيغة غير صالحة — لن يُرسَل لها):<ul>' +
                  data.rejected.map(function (r) {
                    return '<li>' + (r.raw || '').replace(/</g, '&lt;') + ' — ' + (r.reason || '').replace(/</g, '&lt;') + '</li>';
                  }).join('') + '</ul></div>';
              }
              doneItems = skipBlock;
              progressBox.innerHTML = doneItems + '<span class="current">بدء الإرسال…</span>';
            } else if (data.status === 'sending') {
              progressBox.innerHTML = doneItems +
                '<span class="current">جاري الإرسال لـ ' + data.email + ' (' + data.index + '/' + data.total + ')</span>';
            } else if (data.status === 'sent') {
              sendResults.push({ email: data.email, status: 'نجح', message: '' });
              doneItems += '<div class="done-item">تم الإرسال ✓ ' + data.email + '</div>';
              progressBox.innerHTML = doneItems +
                '<span class="current">التالي: ' + (data.index < data.total ? 'جاري التحضير...' : '') + '</span>';
            } else if (data.status === 'error') {
              sendResults.push({ email: data.email, status: 'فشل', message: data.message || '' });
              doneItems += '<div class="fail-item">فشل ✗ ' + data.email + ' — ' + data.message + '</div>';
              progressBox.innerHTML = doneItems + '<span class="current">التالي...</span>';
            } else if (data.status === 'done') {
              const summaryDiv = '<div class="summary">انتهى. الإجمالي: ' + data.total + ' | نجح: ' + data.success + ' | فشل: ' + data.failed + '</div>';
              const exportDiv = '<div class="export-btns"><button type="button" class="btn btn-secondary" id="exportCsv">تحميل CSV</button><button type="button" class="btn btn-secondary" id="exportExcel">تحميل Excel</button></div>';
              progressBox.innerHTML = doneItems + summaryDiv + exportDiv;
              document.getElementById('exportCsv').onclick = () => downloadCsv(sendResults);
              document.getElementById('exportExcel').onclick = async () => {
                try {
                  await downloadExcel(sendResults);
                } catch (err) {
                  alert('فشل تحميل Excel: ' + err.message);
                }
              };
              submitBtn.disabled = false;
              submitBtn.textContent = 'إرسال';
              return;
            }
          }
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'إرسال';
      } catch (err) {
        progressBox.style.display = 'none';
        resultEl.className = 'result card show error';
        resultEl.textContent = err.message || 'خطأ في الاتصال';
        resultEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'إرسال';
      }
    });
  </script>
</body>
</html>
