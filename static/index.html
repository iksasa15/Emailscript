<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إرسال الإيميلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --danger: #f85149;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.5rem 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    input[type="file"]::file-selector-button {
      padding: 0.4rem 0.75rem;
      margin-left: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-top: 0.5rem;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }
    .result.show { display: block; }
    .result.success { background: rgba(63, 185, 80, 0.15); border: 1px solid var(--success); color: var(--success); }
    .result.error { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--danger); color: var(--danger); }
    .result ul { margin-top: 0.5rem; padding-right: 1.25rem; }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>إرسال الإيميلات من ملف إكسل</h1>

    <form id="form" class="card">
      <div class="form-group">
        <label for="email">إيميل المرسل</label>
        <input type="email" id="email" name="email" placeholder="your@gmail.com" required />
      </div>
      <div class="form-group">
        <label for="password">كلمة مرور التطبيق</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
        <p class="hint">استخدم كلمة مرور التطبيق من إعدادات Gmail وليس كلمة مرور الحساب</p>
      </div>
      <div class="form-group">
        <label for="emails_file">ملف الإيميلات (إكسل .xlsx)</label>
        <input type="file" id="emails_file" name="emails_file" accept=".xlsx,.xls" required />
        <p class="hint">العمود الأول أو عمود باسم "email" يحتوي على عناوين الإيميل</p>
      </div>
      <div class="form-group">
        <label for="email_column">اسم عمود الإيميل (اختياري)</label>
        <input type="text" id="email_column" name="email_column" value="email" placeholder="email" />
      </div>
      <div class="form-group">
        <label for="attachments">مرفقات (اختياري)</label>
        <input type="file" id="attachments" name="attachments" multiple />
        <p class="hint">يمكنك اختيار أكثر من ملف. تُرفق نفس الملفات بكل إيميل</p>
      </div>
      <div class="form-group">
        <label for="subject">عنوان الرسالة</label>
        <input type="text" id="subject" name="subject" placeholder="الموضوع" required />
      </div>
      <div class="form-group">
        <label for="body">نص الرسالة</label>
        <textarea id="body" name="body" placeholder="اكتب نص الرسالة هنا..."></textarea>
      </div>
      <div class="form-group">
        <label for="delay">التأخير بين كل إيميل (ثانية)</label>
        <input type="number" id="delay" name="delay" value="1.5" min="0" step="0.5" />
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">إرسال</button>
    </form>

    <div id="result" class="result card"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const resultEl = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultEl.classList.remove('show', 'success', 'error');
      resultEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري الإرسال...';

      const fd = new FormData();
      fd.append('email', document.getElementById('email').value.trim());
      fd.append('password', document.getElementById('password').value);
      fd.append('subject', document.getElementById('subject').value.trim());
      fd.append('body', document.getElementById('body').value.trim());
      fd.append('email_column', document.getElementById('email_column').value.trim() || 'email');
      fd.append('delay', document.getElementById('delay').value || '1.5');
      const file = document.getElementById('emails_file').files[0];
      if (file) fd.append('emails_file', file);
      const attachmentFiles = document.getElementById('attachments').files;
      for (let i = 0; i < attachmentFiles.length; i++) {
        fd.append('attachments', attachmentFiles[i]);
      }

      try {
        const res = await fetch('/send', { method: 'POST', body: fd });
        const data = await res.json();

        if (data.ok) {
          resultEl.className = 'result card show success';
          resultEl.innerHTML = `تم الإرسال بنجاح.<br>الإجمالي: ${data.total} | نجح: ${data.success} | فشل: ${data.failed}` +
            (data.errors && data.errors.length ? `<ul>${data.errors.map(x => '<li>' + x.email + ': ' + x.message + '</li>').join('')}</ul>` : '');
        } else {
          resultEl.className = 'result card show error';
          resultEl.textContent = data.error || 'حدث خطأ';
        }
      } catch (err) {
        resultEl.className = 'result card show error';
        resultEl.textContent = 'خطأ في الاتصال: ' + err.message;
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'إرسال';
    });
  </script>
</body>
</html>
