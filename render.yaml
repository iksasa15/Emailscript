# https://render.com/docs/blueprint-spec
# بعد رفع المشروع إلى GitHub: Dashboard → New → Blueprint → اختر هذا الريبو

services:
  - type: web
    name: emailscript
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 600 app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
